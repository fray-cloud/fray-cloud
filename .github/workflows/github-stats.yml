name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone github-readme-stats
        run: git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/stats

      - name: Install dependencies
        working-directory: /tmp/stats
        run: npm ci

      - name: Start server and generate SVGs
        env:
          PAT_1: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          cd /tmp/stats
          node express.js &
          sleep 5

          mkdir -p assets

          curl -s "http://localhost:9000/api?username=fray-cloud&show_icons=true&theme=transparent&hide_border=true&count_private=true&include_all_commits=true" -o assets/stats.svg
          curl -s "http://localhost:9000/api/top-langs?username=fray-cloud&layout=compact&theme=transparent&hide_border=true" -o assets/top-langs.svg

          kill %1 || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || (git commit -m "Update GitHub stats cards" && git push)

name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=fray-cloud&show_icons=true&theme=transparent&hide_border=true&count_private=true&include_all_commits=true
          path: assets/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=fray-cloud&layout=compact&theme=transparent&hide_border=true&exclude_repo=study_JAVA,study_web,study_hadoop,study_R,study_python,study_ai,study_react,study_nodejs
          path: assets/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || (git commit -m "Update GitHub stats cards" && git push)
